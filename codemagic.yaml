workflows:
  # ── Android (Google Play) ──
  android-build:
    name: Android Build
    max_build_duration: 30
    environment:
      java: 17
      node: 20
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Initialize Capacitor
        script: |
          npx cap init "Focus Garden" com.focusgarden.app --web-dir dist
          npx cap add android
          npx cap sync android
      - name: Set Android version
        script: |
          cd android
          sed -i 's/versionCode 1/versionCode 1/' app/build.gradle
          sed -i 's/versionName "1.0"/versionName "1.0.0"/' app/build.gradle
      - name: Build Android AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal  # internal → alpha → beta → production

  # ── iOS (App Store) ──
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: 20
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Initialize Capacitor
        script: |
          npx cap init "Focus Garden" com.focusgarden.app --web-dir dist
          npx cap add ios
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.focusgarden.app --type IOS_APP_STORE
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          cd ios/App
          xcode-project build-ipa --workspace App.xcworkspace --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

